<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnifoLM-WorldPred-1</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --paper: #ffffff;
      --ink: #17212b;
      --muted: #65717d;
      --line: #d9ded7;
      --line-strong: #bac4bd;
      --red: #c43b3b;
      --orange: #d97706;
      --blue: #2563eb;
      --green: #2f8f4e;
      --shadow: 0 16px 48px rgba(23, 33, 43, 0.12);
      --content-width: 1180px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #eef2ef 0, rgba(247, 248, 245, 0) 420px), var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    button { font: inherit; }

    a { color: inherit; }

    .shell {
      width: min(var(--content-width), calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 64px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 18px;
    }

    .resample-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink);
      font-weight: 850;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .lang-switch {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: clamp(1rem, 1.7vw, 1.32rem);
      font-weight: 750;
    }

    .lang-option {
      padding: 0;
      border: 0;
      background: transparent;
      color: #0969da;
      font: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
    }

    .lang-option.active {
      color: var(--ink);
      text-decoration-thickness: 3px;
    }

    .lang-separator {
      color: #6b5b4f;
      font-weight: 900;
    }

    .hero {
      padding: 12px 0 46px;
      border-bottom: 1px solid var(--line);
      text-align: center;
    }

    .eyebrow {
      display: block;
      margin: 14px 0 0;
      color: var(--ink);
      font-size: clamp(1.35rem, 2.7vw, 2.35rem);
      font-weight: 800;
      letter-spacing: 0;
      text-transform: none;
    }

    html[lang="en"] .eyebrow {
      font-size: clamp(1rem, 1.9vw, 1.65rem);
    }

    h1 {
      display: block;
      margin: 0;
      font-size: clamp(1.65rem, 3.4vw, 3rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .title-line {
      max-width: none;
      margin: 0 auto;
      line-height: 1.2;
      white-space: nowrap;
    }

    .resource-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 9px;
      margin-top: 30px;
    }

    .resource-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 112px;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      background: #333333;
      color: #fff;
      font-size: clamp(0.9rem, 1.45vw, 1.12rem);
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .resource-pill:hover {
      background: #202020;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      transform: translateY(-2px);
    }

    .resource-icon {
      display: inline-grid;
      place-items: center;
      width: 19px;
      height: 19px;
      font-size: 1rem;
      line-height: 1;
    }

    .resource-icon svg {
      width: 19px;
      height: 19px;
      fill: currentColor;
    }

    .resource-pill small {
      font-size: 0.68em;
      font-weight: 500;
      opacity: 0.86;
    }

    .page-section {
      border-bottom: 1px solid var(--line);
      padding: 30px 0 34px;
    }

    .intro {
      width: 100%;
      margin: 30px auto 0;
      color: #34414f;
      font-size: clamp(1rem, 1.35vw, 1.14rem);
      line-height: 1.68;
      text-align: justify;
      text-align-last: left;
    }

    .intro strong {
      color: var(--ink);
      font-weight: 850;
    }

    .section-intro {
      width: 100%;
      margin: 34px auto 18px;
      color: #34414f;
      font-size: clamp(1rem, 1.35vw, 1.14rem);
      line-height: 1.68;
      text-align: justify;
      text-align-last: left;
    }

    .section-intro strong {
      color: var(--ink);
      font-weight: 850;
    }

    .ecosystem-note {
      margin-top: 34px;
    }

    .rainbow-emphasis {
      display: inline;
      padding: 0 0.12em;
      border-radius: 0.35em;
      background: linear-gradient(90deg, #c43b3b 0%, #d97706 22%, #f2b705 43%, #2f8f4e 62%, #2563eb 82%, #7c3aed 100%);
      background-size: 160% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 900;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
      margin: 0 auto;
    }

    .preview-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin-left: auto;
      margin-right: auto;
      margin-top: 14px;
    }

    .resample-btn {
      min-height: 46px;
      padding: 0 24px;
      border-color: #c45f04;
      background: var(--orange);
      color: #fff;
      font-size: 0.96rem;
      box-shadow: 0 10px 24px rgba(217, 119, 6, 0.24);
    }

    .resample-btn:hover {
      border-color: #9a4a03;
      background: #b95f04;
      box-shadow: 0 14px 30px rgba(217, 119, 6, 0.32);
      transform: translateY(-2px);
    }

    .preview-page-label {
      min-width: 58px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .preview-tile {
      display: block;
      min-width: 0;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .preview-tile:hover {
      border-color: var(--line-strong);
      transform: translateY(-2px);
      box-shadow: 0 12px 34px rgba(23, 33, 43, 0.12);
    }

    .preview-media,
    .video-stage {
      aspect-ratio: 4 / 3;
      background: #050709;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .preview-meta {
      min-height: 56px;
      padding: 7px 8px 8px;
    }

    .preview-meta strong {
      display: block;
      overflow: hidden;
      font-size: clamp(0.64rem, 0.78vw, 0.74rem);
      line-height: 1.16;
      text-overflow: clip;
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .preview-meta span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: none;
    }

    .preview-tile.tabletop-ego .preview-meta span,
    .category-section.tabletop-ego .category-label { color: var(--red); }

    .preview-tile.wholebody-ego .preview-meta span,
    .category-section.wholebody-ego .category-label { color: var(--blue); }

    .preview-tile.tabletop-external .preview-meta span,
    .category-section.tabletop-external .category-label { color: var(--orange); }

    .preview-tile.wholebody-external .preview-meta span,
    .category-section.wholebody-external .category-label { color: var(--green); }

    .section-head {
      margin: 30px 0 16px;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.3rem);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 0;
    }

    .category-stack {
      display: grid;
      gap: 34px;
    }

    .category-section {
      scroll-margin-top: 20px;
      border-top: 1px solid var(--line);
      padding-top: 24px;
    }

    .category-bar {
      display: grid;
      grid-template-columns: minmax(260px, 420px) minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      margin-bottom: 14px;
    }

    .category-label {
      margin: 0;
      font-size: clamp(1.2rem, 2.2vw, 1.85rem);
      font-weight: 850;
      letter-spacing: 0;
    }

    .task-title {
      margin: 0;
      overflow: hidden;
      color: #394653;
      font-size: clamp(0.82rem, 1.18vw, 1rem);
      line-height: 1.25;
      text-align: center;
    }

    .category-bar .task-title {
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-title.below {
      width: min(920px, 100%);
      margin: 12px auto 0;
      text-overflow: clip;
      white-space: normal;
    }

    .task-title-row {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .task-title-row.ego {
      grid-template-columns: 1fr;
    }

    .task-title-row.external {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .task-title-row .task-title {
      margin: 0;
      white-space: nowrap;
      font-size: clamp(0.72rem, 0.95vw, 0.9rem);
    }

    .compare-shell {
      position: relative;
    }

    .compare-grid {
      display: grid;
      gap: 10px;
    }

    .compare-grid.ego {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: stretch;
      gap: 12px;
    }

    .compare-grid.external {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      position: relative;
    }

    .compare-grid.external::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 32px;
      left: 50%;
      border-left: 1px dashed var(--line-strong);
      transform: translateX(-0.5px);
      pointer-events: none;
    }

    .video-cell {
      min-width: 0;
      margin: 0;
    }

    .video-stage {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .compare-video,
    .compare-clip {
      position: absolute;
      inset: 0;
    }

    .compare-clip {
      clip-path: inset(0 50% 0 0);
      will-change: clip-path;
    }

    .compare-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      margin-left: -1px;
      background: rgba(255, 255, 255, 1);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.35), 0 0 18px rgba(255,255,255,0.65);
      pointer-events: none;
      will-change: left;
    }

    .compare-label,
    .plain-label {
      position: absolute;
      top: 9px;
      z-index: 2;
      padding: 5px 8px;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(0, 0, 0, 0.08);
      color: rgba(255, 255, 255, 0.62);
      font-size: 0.72rem;
      font-weight: 850;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      pointer-events: none;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .compare-label.left { left: 9px; }
    .compare-label.right { right: 9px; }
    .plain-label { left: 9px; color: #fff; }
    .plain-label.generated { background: rgba(28, 80, 145, 0.92); }
    .plain-label.ground-truth { background: rgba(18, 108, 77, 0.92); }

    .compare-grid.ego .video-cell:nth-child(-n+3) .video-stage {
      border-color: rgba(28, 80, 145, 0.28);
      box-shadow: 0 10px 24px rgba(28, 80, 145, 0.10);
    }

    .compare-grid.ego .video-cell:nth-child(n+4) .video-stage {
      border-color: rgba(18, 108, 77, 0.28);
      box-shadow: 0 10px 24px rgba(18, 108, 77, 0.10);
    }

    .compare-label.left.active {
      border-color: rgba(215, 255, 232, 0.95);
      background: rgba(18, 108, 77, 0.92);
      color: #fff;
      box-shadow: 0 0 0 1px rgba(215, 255, 232, 0.45);
    }

    .compare-label.right.active {
      border-color: rgba(217, 235, 255, 0.95);
      background: rgba(28, 80, 145, 0.92);
      color: #fff;
      box-shadow: 0 0 0 1px rgba(217, 235, 255, 0.45);
    }

    figcaption {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 400;
      text-align: center;
      text-transform: uppercase;
    }

    .icon-btn {
      position: absolute;
      top: 50%;
      z-index: 5;
      width: 54px;
      height: 54px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(23, 33, 43, 0.18);
      transform: translateY(-50%);
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .icon-btn:hover {
      border-color: var(--line-strong);
      background: #fff;
      transform: translateY(-50%) scale(1.04);
    }

    .icon-btn.prev { left: -26px; }
    .icon-btn.next { right: -26px; }

    @media (max-width: 1050px) {
      .preview-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .compare-grid.external { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .compare-grid.external::after { display: none; }
      .category-bar { grid-template-columns: 1fr; }
      .icon-btn.prev { left: 8px; }
      .icon-btn.next { right: 8px; }
    }

    @media (max-width: 640px) {
      .shell { width: min(100% - 24px, var(--content-width)); padding-top: 20px; }
      .preview-grid,
      .compare-grid.external { grid-template-columns: 1fr; }
      .compare-grid.ego { grid-template-columns: 1fr; }
      .task-title { white-space: normal; }
      .topbar { justify-content: center; }
      .resource-pill { min-width: 0; flex: 1 1 112px; }
      h1,
      .eyebrow { display: block; }
      .eyebrow { margin: 10px 0 0; }
      .title-line { white-space: normal; }
    }
  </style>
</head>

  </main>

    const previewPageSize = 8;
    const featuredPool = data.featured && data.featured.length ? data.featured : (data.preview || data.previewPool || []);

    function t(key) {
      return i18n[lang][key];
    }

    function getPreviewSrc(entry) {
      return entry.views.main.gen;
    }

    function categoryLabel(entryOrCategory) {
      return i18n[lang].category[entryOrCategory.category || entryOrCategory.key] || entryOrCategory.categoryLabel || entryOrCategory.label;
    }

    function taskTitle(task) {
      return i18n[lang].taskLabels[task.task] || task.title;
    }

    function shuffle(items) {
      const output = [...items];
      for (let i = output.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [output[i], output[j]] = [output[j], output[i]];
      }
      return output;
    }

    function randomSample(items, count, blockedIds = new Set()) {
      return shuffle(items.filter(item => !blockedIds.has(item.id))).slice(0, count);
    }

    function balancedPreviewSample(items, count, blockedIds = new Set()) {
      const selected = [];
      const selectedIds = new Set();
      data.categories.forEach(category => {
        const candidates = items.filter(item => item.category === category.key && !blockedIds.has(item.id));
        const pick = randomSample(candidates, 1)[0];
        if (pick && !selectedIds.has(pick.id)) {
          selected.push(pick);
          selectedIds.add(pick.id);
        }
      });
      const blocked = new Set([...blockedIds, ...selectedIds]);
      const rest = randomSample(items, count - selected.length, blocked);
      return shuffle([...selected, ...rest]).slice(0, count);
    }

    function changePreviewPage(dir) {
      previewPage = (previewPage + dir + previewPageCount) % previewPageCount;
      renderPreview();
    }

    function applyLanguage() {
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      document.querySelectorAll("[data-i18n]").forEach(node => {
        node.textContent = t(node.dataset.i18n);
      });
      document.querySelectorAll("[data-i18n-html]").forEach(node => {
        node.innerHTML = t(node.dataset.i18nHtml);
      });
      document.getElementById("lang-en").classList.toggle("active", lang === "en");
      document.getElementById("lang-zh").classList.toggle("active", lang === "zh");
    }

    function renderPreview() {
      const grid = document.getElementById("preview-grid");
      grid.innerHTML = "";
      const start = previewPage * previewPageSize;
      const previewItems = featuredPool.slice(start, start + previewPageSize);
      previewItems.forEach(entry => {
        const button = document.createElement("button");
        button.className = `preview-tile ${entry.category.replaceAll("_", "-")}`;
        button.type = "button";
        button.innerHTML = `
          <div class="preview-media">
            <video src="${getPreviewSrc(entry)}" muted autoplay loop playsinline preload="metadata"></video>
          </div>
          <div class="preview-meta">
            <strong>${taskTitle(entry)}</strong>
            <span>${categoryLabel(entry)}</span>
          </div>
        `;
        button.addEventListener("click", () => {
          const category = data.categories.find(item => item.key === entry.category);
          if (!category) return;
          let index = category.tasks.findIndex(item => item.id === entry.id);
          if (index < 0) index = category.tasks.findIndex(item => item.task === entry.task);
          if (index >= 0) {
            state.set(category.key, index);
            renderCategory(category);
          }
          document.getElementById(`section-${category.key}`).scrollIntoView({ behavior: "smooth", block: "start" });
        });
        grid.appendChild(button);
      });
      document.getElementById("preview-page-label").textContent = `${previewPage + 1} / ${previewPageCount}`;
    }

    function setComparePosition(stage, pct) {
      const p = Math.max(0, Math.min(100, pct));
      const clip = stage.querySelector(".compare-clip");
      const handle = stage.querySelector(".compare-handle");
      const leftLabel = stage.querySelector(".compare-label.left");
      const rightLabel = stage.querySelector(".compare-label.right");
      if (!clip || !handle || !leftLabel || !rightLabel) return;
      clip.style.clipPath = `inset(0 ${100 - p}% 0 0)`;
      handle.style.left = `${p}%`;
      leftLabel.classList.toggle("active", p >= 42);
      rightLabel.classList.toggle("active", p <= 58);
    }

    function setGridComparePosition(grid, pct) {
      grid.querySelectorAll(".video-stage.compare").forEach(stage => setComparePosition(stage, pct));
    }

    function syncGridVideos(grid) {
      const videos = Array.from(grid.querySelectorAll("video"));
      const master = videos[0];
      if (!master) return;

      const syncVideos = (force = false) => {
        if (!master.duration || master.readyState < 2) return;
        videos.slice(1).forEach(video => {
          if (!video.duration || video.readyState < 1) return;
          const drift = Math.abs(video.currentTime - master.currentTime);
          if (force || drift > 0.75) {
            try { video.currentTime = master.currentTime; } catch (_) {}
          }
          if (video.paused) video.play().catch(() => {});
        });
      };

      master.addEventListener("play", () => syncVideos(true));
      master.addEventListener("seeked", () => syncVideos(true));
      master.addEventListener("loadedmetadata", () => syncVideos(true));
      master.addEventListener("timeupdate", () => {
        if (master.currentTime < 0.2) syncVideos(true);
      });
      setInterval(() => {
        if (!master.paused) syncVideos(false);
      }, 1200);
    }

    function compareCell(view, pair) {
      return `
        <figure class="video-cell">
          <div class="video-stage compare">
            <video class="compare-video" src="${pair.gen}" muted autoplay loop playsinline preload="metadata"></video>
            <div class="compare-clip">
              <video class="compare-video" src="${pair.gt}" muted autoplay loop playsinline preload="metadata"></video>
            </div>
            <div class="compare-handle" aria-hidden="true"></div>
            <span class="compare-label left">${t("groundTruth")}</span>
            <span class="compare-label right">${t("generated")}</span>
          </div>
          <figcaption>${i18n[lang].views[view] || view}</figcaption>
        </figure>
      `;
    }

    function plainVideoCell(task, kind) {
      const label = kind === "gen" ? t("generated") : t("groundTruth");
      const labelClass = kind === "gen" ? "generated" : "ground-truth";
      return `
        <figure class="video-cell">
          <div class="video-stage plain">
            <video src="${task.views.main[kind]}" muted autoplay loop playsinline preload="metadata"></video>
            <span class="plain-label ${labelClass}">${label}</span>
          </div>
        </figure>
      `;
    }

    function egoVideoCell(task, view, kind) {
      const label = kind === "gen" ? t("generated") : t("groundTruth");
      const labelClass = kind === "gen" ? "generated" : "ground-truth";
      return `
        <figure class="video-cell">
          <div class="video-stage plain">
            <video src="${task.views[view][kind]}" muted autoplay loop playsinline preload="metadata"></video>
            <span class="plain-label ${labelClass}">${label}</span>
          </div>
          <figcaption>${i18n[lang].views[view] || view}</figcaption>
        </figure>
      `;
    }

    function egoCells(task) {
      const views = ["left_wrist", "main", "right_wrist"].filter(view => task.views[view]);
      const generatedRow = views.map(view => egoVideoCell(task, view, "gen")).join("");
      const groundTruthRow = views.map(view => egoVideoCell(task, view, "gt")).join("");
      return generatedRow + groundTruthRow;
    }

    function taskSummary(tasks) {
      if (tasks.length === 1) return taskTitle(tasks[0]);
      const titles = Array.from(new Set(tasks.map(task => taskTitle(task))));
      return titles.join(" / ");
    }

    function externalPairs(category) {
      if (category.key === "wholebody_external") {
        return differentTaskPairs(category.tasks);
      }
      const byTask = new Map();
      category.tasks.forEach(entry => {
        if (!byTask.has(entry.task)) byTask.set(entry.task, []);
        byTask.get(entry.task).push(entry);
      });
      return Array.from(byTask.values())
        .filter(entries => entries.length >= 2)
        .map(entries => pickDiversePair(entries));
    }

    function differentTaskPairs(tasks) {
      const firstByTask = [];
      const seen = new Set();
      tasks.forEach(entry => {
        if (!seen.has(entry.task)) {
          firstByTask.push(entry);
          seen.add(entry.task);
        }
      });
      const pairs = [];
      for (let i = 0; i < firstByTask.length; i += 2) {
        const first = firstByTask[i];
        const second = firstByTask[i + 1] || firstByTask[0];
        if (first && second && first.task !== second.task) pairs.push([first, second]);
      }
      return pairs;
    }

    function externalViewTag(entry) {
      const match = entry.episode.match(/^\d{8}_([^_]+)__episode_/);
      return match ? match[1] : entry.episode;
    }

    function pickDiversePair(entries) {
      const first = entries[0];
      const firstTag = externalViewTag(first);
      const second = entries.find(entry => externalViewTag(entry) !== firstTag) || entries[1];
      return [first, second];
    }

    function buildCategorySection(category) {
      const index = state.get(category.key) || 0;
      const firstTask = category.tasks[index] || category.tasks[0];
      const isEgo = category.key.endsWith("_ego");
      const pairs = isEgo ? [] : externalPairs(category);
      const pairIndex = pairs.length ? index % pairs.length : 0;
      const displayTasks = isEgo
        ? [firstTask]
        : (pairs[pairIndex] || []);
      const cells = isEgo
        ? egoCells(firstTask)
        : displayTasks.map(task => `${plainVideoCell(task, "gen")}${plainVideoCell(task, "gt")}`).join("");
      const categoryTitle = lang === "zh" ? `<h3 class="task-title">${taskSummary(displayTasks)}</h3>` : "";
      const titleRow = lang === "zh" ? "" : (isEgo
        ? `<div class="task-title-row ego"><h3 class="task-title">${taskTitle(firstTask)}</h3></div>`
        : `<div class="task-title-row external">${displayTasks.map(task => `<h3 class="task-title">${taskTitle(task)}</h3>`).join("")}</div>`);
      const section = document.createElement("section");
      section.className = `category-section ${category.key.replaceAll("_", "-")}`;
      section.id = `section-${category.key}`;
      section.innerHTML = `
        <div class="category-bar">
          <p class="category-label">${categoryLabel(category)}</p>
          ${categoryTitle}
        </div>
        <div class="compare-shell">
          <button class="icon-btn prev" type="button" aria-label="Previous task" data-dir="-1">&#9664;</button>
          <div class="compare-grid ${isEgo ? "ego" : "external"}">${cells}</div>
          <button class="icon-btn next" type="button" aria-label="Next task" data-dir="1">&#9654;</button>
        </div>
        ${titleRow}
      `;
      section.querySelectorAll(".icon-btn").forEach(button => {
        button.addEventListener("click", () => {
          const dir = Number(button.dataset.dir);
          const total = isEgo ? category.tasks.length : pairs.length;
          const next = total ? (index + dir + total) % total : 0;
          state.set(category.key, next);
          renderCategory(category);
        });
      });
      const egoGrid = section.querySelector(".compare-grid.ego");
      if (egoGrid) syncGridVideos(egoGrid);
      return section;
    }

    function renderCategory(category) {
      const nextSection = buildCategorySection(category);
      const oldSection = document.getElementById(`section-${category.key}`);
      if (oldSection) {
        oldSection.replaceWith(nextSection);
      } else {
        document.getElementById("category-stack").appendChild(nextSection);
      }
    }

    function renderCategories() {
      const stack = document.getElementById("category-stack");
      stack.innerHTML = "";
      data.categories.forEach(renderCategory);
    }

    document.getElementById("lang-en").addEventListener("click", () => {
      lang = "en";
      applyLanguage();
      renderPreview();
      renderCategories();
    });
    document.getElementById("lang-zh").addEventListener("click", () => {
      lang = "zh";
      applyLanguage();
      renderPreview();
      renderCategories();
    });
    document.getElementById("preview-prev").addEventListener("click", () => changePreviewPage(-1));
    document.getElementById("preview-next").addEventListener("click", () => changePreviewPage(1));
    applyLanguage();
    renderPreview();
    renderCategories();
  </script>
